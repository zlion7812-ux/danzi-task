<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分史记 - 蛋仔勇者之路</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1b2a 50%, #1b2f44 100%);
            font-family: 'Segoe UI', 'Comic Neue', cursive;
            padding: 20px;
            min-height: 100vh;
            color: #f0e6d0;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(10, 20, 30, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            border: 1px solid #e6b422;
            padding: 25px;
        }

        h1 {
            text-align: center;
            color: #ffdd99;
            text-shadow: 0 0 8px #ffaa33;
            margin-bottom: 10px;
        }

        .points-card {
            background: #1e2a2a;
            border-radius: 40px;
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid #e6b422;
        }

        .points-card span {
            font-size: 2rem;
            color: #ffcc44;
            font-weight: bold;
        }

        .history-list {
            background: #1a1a2a;
            border-radius: 30px;
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .history-item {
            background: #2a2a3a;
            border-radius: 20px;
            padding: 12px 15px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-time {
            color: #88aaff;
            font-family: monospace;
            font-size: 0.75rem;
        }

        .history-change {
            font-weight: bold;
        }

        .history-change.plus {
            color: #44ff44;
        }

        .history-change.minus {
            color: #ff8888;
        }

        .history-desc {
            flex: 1;
            min-width: 120px;
        }

        .history-total {
            color: #ffaa44;
        }

        .empty-tip {
            text-align: center;
            padding: 30px;
            color: #aaa;
        }

        .back-btn {
            background: #3a4a3a;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .back-btn:active {
            transform: scale(0.98);
        }

        .source-tag {
            font-size: 0.7rem;
            background: #1a1a2e;
            padding: 2px 8px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📜 积分史记 📜</h1>
    <div class="points-card">
        💰 当前积分：<span id="pointsDisplay">{{ user_points }}</span>
    </div>

    <div class="history-list">
        {% if points_history %}
            {% for record in points_history %}
            <div class="history-item">
                <div class="history-time">🕐 {{ record.time }}</div>
                <div class="history-change {% if record.change >= 0 %}plus{% else %}minus{% endif %}">
                    {% if record.change >= 0 %}+{% endif %}{{ record.change }}
                </div>
                <div class="history-desc">{{ record.description }}</div>
                <div class="history-total">💰 {{ record.total }}</div>
                <div class="source-tag">{{ record.source }}</div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty-tip">✨ 暂无积分记录，快去完成任务吧 ✨</div>
        {% endif %}
    </div>

    <button class="back-btn" onclick="goBack()">◀ 返回征途</button>
</div>

<script>
    function goBack() {
        window.location.href = '/';
    }
</script>
</body>
</html>
