<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛋仔勇者之路 - 管理后台</title>
    <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
<div class="admin-container">
    <div class="admin-header-bar">
        <h1 class="admin-h1">🐉 勇者之路 · 管理后台</h1>
        <button class="logout-btn" onclick="adminLogout()">🚪 退出登录</button>
    </div>

    <!-- 任务管理 -->
    <div class="collapse-section">
        <div class="collapse-header" onclick="toggleCollapse('taskSection')">
            <span class="collapse-arrow" id="taskSectionArrow">▶</span>
            <h2 class="admin-h2" style="border-left: none; margin: 0;">📋 每日任务配置</h2>
        </div>
        <div class="collapse-content" id="taskSection" style="display: none;">
            <div class="task-list" id="taskList"></div>
            <button class="success" onclick="adminShowAddTaskModal()">➕ 添加新任务</button>
        </div>
    </div>

    <hr>

    <!-- 怪物图鉴管理 -->
    <div class="collapse-section">
        <div class="collapse-header" onclick="toggleCollapse('monsterSection')">
            <span class="collapse-arrow" id="monsterSectionArrow">▶</span>
            <h2 class="admin-h2" style="border-left: none; margin: 0;">👾 怪物图鉴管理</h2>
        </div>
        <div class="collapse-content" id="monsterSection" style="display: none;">
            <div class="monster-list" id="monsterList"></div>
            <button class="success" onclick="adminShowAddMonsterForm()">➕ 添加新怪物</button>
            <div id="addMonsterForm" class="add-form" style="display:none;">
                <h3>新建怪物</h3>
                <input type="text" id="newMonsterName" placeholder="怪物名称">
                <input type="text" id="newMonsterIcon" placeholder="图标" value="👾">
                <input type="number" id="newMonsterPoints" placeholder="默认积分" value="2">
                <textarea id="newMonsterDesc" placeholder="怪物描述" rows="2"></textarea>
                <div class="form-row">
                    <button class="success" onclick="adminAddMonster()">✅ 确认添加</button>
                    <button onclick="adminHideAddMonsterForm()">❌ 取消</button>
                </div>
            </div>
        </div>
    </div>

    <hr>

    <!-- 商品管理 -->
    <div class="collapse-section">
        <div class="collapse-header" onclick="toggleCollapse('shopSection')">
            <span class="collapse-arrow" id="shopSectionArrow">▶</span>
            <h2 class="admin-h2" style="border-left: none; margin: 0;">🏪 赏金所商品配置</h2>
        </div>
        <div class="collapse-content" id="shopSection" style="display: none;">
            <div class="shop-list" id="shopList"></div>
            <button class="success" onclick="adminShowAddShopModal()">➕ 添加新商品</button>
        </div>
    </div>

    <hr>

    <!-- 系统设置 -->
    <h2 class="admin-h2">⚙️ 系统设置</h2>
    <div class="task-list" style="background:#0f0f23;">
        <div style="padding:15px;">
            <div class="config-item">
                <label>🎯 连胜规则</label>
                <select id="streakRuleSelect" class="config-select">
                    <option value="login">🟢 宽松模式（登录即涨连胜）</option>
                    <option value="clear_all">🔴 严格模式（必须全清才涨连胜）</option>
                </select>
                <div class="config-hint">
                    🟢 宽松：只要孩子当天打开页面，连胜天数就会+1<br>
                    🔴 严格：孩子必须打败所有怪物，连胜天数才会+1
                </div>
            </div>
            <div class="button-group">
                <button class="success" onclick="adminSaveSystemConfig()">💾 保存设置</button>
                <button class="warning" onclick="adminResetStreak()">🔄 重置连胜天数</button>
                <button class="warning" onclick="adminResetChildDay()">🔄 重置今日任务</button>
                <button class="danger" onclick="adminResetAllData()" style="background:#8b0000;">⚠️ 重置所有数据</button>
            </div>
        </div>
    </div>

    <!-- 手动调整积分 -->
    <h2 class="admin-h2">💰 手动调整积分</h2>
    <div class="task-list" style="background:#0f0f23;">
        <div style="padding:15px;">
            <div style="margin-bottom: 15px;">
                <span style="font-size: 1.2rem; color: #ffcc44;">当前积分：</span>
                <span id="currentPoints" style="font-size: 1.5rem; font-weight: bold; color: #ffaa44;">--</span>
            </div>
            <div class="button-group">
                <button class="success" onclick="showAddPointsModal()" style="background:#44aa44;">➕ 增加积分</button>
                <button class="danger" onclick="showDeductPointsModal()" style="background:#aa4444;">➖ 扣除积分</button>
            </div>
        </div>
    </div>

    <hr>
    <div class="tips">
        💡 提示：<br>
        • 修改任务/怪物/商品后，刷新页面即可生效<br>
        • 禁用任务后，该任务不会出现在孩子的地图上<br>
        • 调整 order 数值可以改变任务的显示顺序（数字越小越靠左）<br>
        • 连胜规则切换后，从第二天开始生效
    </div>
</div>

<!-- 任务编辑弹窗 -->
<div id="taskModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <div class="modal-title" id="taskModalTitle">编辑任务</div>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editTaskId">
            <div class="form-group">
                <label>📝 任务名称</label>
                <input type="text" id="editTaskName">
            </div>
            <div class="form-group">
                <label>👾 关联怪物</label>
                <select id="editMonsterId"></select>
            </div>
            <div class="form-group">
                <label>💰 积分奖励</label>
                <input type="number" id="editTaskPoints">
            </div>
            <div class="form-group">
                <label>🔢 显示顺序</label>
                <input type="number" id="editTaskOrder">
            </div>
            <div class="form-group">
                <label>📄 任务描述</label>
                <textarea id="editTaskDesc" rows="3"></textarea>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="editTaskEnabled">
                <label>✅ 启用此任务</label>
            </div>
        </div>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-primary" id="taskSaveBtn">💾 保存</button>
            <button class="modal-btn modal-btn-secondary" id="taskCancelBtn">取消</button>
        </div>
    </div>
</div>

<!-- 商品编辑弹窗 -->
<div id="shopModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <div class="modal-title" id="shopModalTitle">编辑商品</div>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editShopId">
            <div class="form-group">
                <label>🎁 商品名称</label>
                <input type="text" id="editShopName">
            </div>
            <div class="form-group">
                <label>🖼️ 商品图标</label>
                <input type="text" id="editShopIcon" maxlength="2">
            </div>
            <div class="form-group">
                <label>💰 商品价格</label>
                <input type="number" id="editShopPrice">
            </div>
            <div class="form-group">
                <label>📋 商品类型</label>
                <select id="editShopType">
                    <option value="normal">普通</option>
                    <option value="weekend_only">仅限周末</option>
                </select>
            </div>
            <div class="form-group">
                <label>📆 周限购次数</label>
                <input type="number" id="editShopWeeklyLimit" placeholder="留空不限购">
            </div>
            <div class="form-group">
                <label>📄 商品描述</label>
                <textarea id="editShopDesc" rows="2"></textarea>
            </div>
        </div>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-primary" id="shopSaveBtn">💾 保存</button>
            <button class="modal-btn modal-btn-secondary" id="shopCancelBtn">取消</button>
        </div>
    </div>
</div>

<!-- 积分调整弹窗 -->
<div id="pointsModal" class="modal-overlay">
    <div class="modal-container small">
        <div class="modal-header">
            <div class="modal-title" id="pointsModalTitle">调整积分</div>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>📊 积分数量</label>
                <input type="number" id="pointsAmount">
            </div>
            <div class="form-group">
                <label>📝 调整原因</label>
                <input type="text" id="pointsReason">
            </div>
        </div>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-primary" id="pointsConfirmBtn">确认调整</button>
            <button class="modal-btn modal-btn-secondary" id="pointsCancelBtn">取消</button>
        </div>
    </div>
</div>

<script src="/static/admin.js"></script>
</body>
</html>
