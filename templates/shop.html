<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赏金所 - 蛋仔勇者之路</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1b2a 50%, #1b2f44 100%);
            font-family: 'Segoe UI', 'Comic Neue', cursive;
            padding: 20px;
            min-height: 100vh;
            color: #f0e6d0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(10, 20, 30, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            border: 1px solid #e6b422;
            padding: 25px;
        }

        h1 {
            text-align: center;
            color: #ffdd99;
            text-shadow: 0 0 8px #ffaa33;
            margin-bottom: 10px;
        }

        .points-card {
            background: #1e2a2a;
            border-radius: 40px;
            padding: 15px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid #e6b422;
        }

        .points-card span {
            font-size: 2rem;
            color: #ffcc44;
            font-weight: bold;
        }

        .shop-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .shop-item {
            background: #2a2a3a;
            border-radius: 30px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #5a5a6a;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .item-price {
            color: #ffaa44;
            margin-top: 5px;
        }

        .buy-btn {
            background: #44aa44;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }

        .buy-btn:active {
            transform: scale(0.96);
        }

        .back-btn {
            background: #3a4a3a;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .back-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏪 赏金所 🏪</h1>
    <div class="points-card">
        💰 当前积分：<span id="pointsDisplay">{{ user_points }}</span>
    </div>

    <div class="shop-grid" id="shopGrid">
        {% for item in shop_items %}
        <div class="shop-item">
            <div class="item-info">
                <div class="item-name">{{ item.icon }} {{ item.name }}</div>
                <div class="item-price">💰 {{ item.price }} 积分</div>
                {% if item.type == 'weekend_only' %}
                <div class="item-price" style="color:#88aaff; font-size:0.7rem;">📅 仅限周末兑换</div>
                {% endif %}
                {% if item.weekly_limit %}
                <div class="item-price" style="color:#ffaa88; font-size:0.7rem;">📆 每周限{{ item.weekly_limit }}次</div>
                {% endif %}
            </div>
            <button class="buy-btn" onclick="buyItem({{ item.id }})">兑换</button>
        </div>
        {% endfor %}
    </div>

    <button class="back-btn" onclick="goBack()">◀ 返回征途</button>
</div>

<script>
    async function buyItem(itemId) {
        let resp = await fetch('/buy', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({item_id: itemId})
        });
        let data = await resp.json();
        if (data.error) {
            alert(data.error);
        } else {
            alert(data.message);
            location.reload();
        }
    }

    function goBack() {
        window.location.href = '/';
    }
</script>
</body>
</html>
