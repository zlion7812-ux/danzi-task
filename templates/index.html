<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>蛋仔勇者之路 · 征途再启</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0d1b2a 50%, #1b2f44 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Cinema', cursive;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(10, 30, 30, 0.75);
            backdrop-filter: blur(5px);
            border-radius: 70px;
            border: 2px solid #e6b422;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 200, 0.2);
            overflow: hidden;
            padding: 20px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #1e2a2a;
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 30px;
            border: 1px solid #e6b422;
        }

        .points-box, .streak-box {
            font-size: 1.3rem;
            font-weight: bold;
            background: #0a0a1a;
            padding: 5px 20px;
            border-radius: 40px;
            color: #ffcc44;
        }

        .world-map {
            background: radial-gradient(ellipse at 30% 40%, #2a4a2a, #0a1a0a);
            border-radius: 60px;
            padding: 30px 20px;
            margin-bottom: 20px;
            border: 1px solid #5a8a3a;
            overflow-x: auto;
        }

        .chapter-title {
            text-align: center;
            font-size: 1.6rem;
            color: #ffdd99;
            text-shadow: 0 0 8px #ffaa33;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .progress-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .progress-bar-bg {
            background: #2a2a2a;
            height: 18px;
            width: 80%;
            margin: 0 auto;
            border-radius: 30px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #e6b422, #ffdd99);
            border-radius: 30px;
            transition: width 0.3s;
        }

        .progress-text {
            margin-top: 8px;
            color: #ccc;
            font-size: 0.9rem;
        }

        .node-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            min-width: 800px;
            flex-wrap: nowrap;
        }

        .node-card {
            flex: 1;
            background: #2a2a3a;
            border-radius: 40px;
            padding: 20px 10px;
            text-align: center;
            transition: all 0.2s;
            border: 2px solid #5a5a6a;
            box-shadow: 0 6px 0 #1a1a2a;
            cursor: pointer;
            min-width: 110px;
        }

        .node-card.completed {
            background: #2a6a2a;
            border-color: #88ff88;
            filter: drop-shadow(0 0 6px #88ff88);
            cursor: default;
        }

        .node-icon {
            font-size: 3rem;
        }

        .node-name {
            font-weight: bold;
            margin-top: 10px;
            font-size: 1rem;
        }

        .node-status {
            font-size: 0.7rem;
            margin-top: 6px;
            background: #00000066;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .portal-card {
            background: radial-gradient(circle, #6a3a8a, #2a1a4a);
            border-color: #ff66ff;
            box-shadow: 0 0 15px #ff66ff;
            cursor: pointer;
        }

        .connector-line {
            font-size: 2rem;
            color: #e6b422;
            font-weight: bold;
            text-shadow: 0 0 5px orange;
        }

        .tab-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .tab-btn {
            background: #2a3a2a;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            color: #ffdd88;
            font-weight: bold;
            cursor: pointer;
        }

        .admin-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
        }

        .bonus-area {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #2a1a3a;
            border-radius: 40px;
        }

        .bonus-quest {
            background: #3a2a4a;
            border-radius: 30px;
            padding: 12px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .complete-bonus-btn {
            background: #44aa44;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .treasure-area {
            text-align: center;
            margin-top: 20px;
        }

        .treasure-btn {
            background: linear-gradient(135deg, #ffaa44, #ff6644);
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="stats-bar">
        <div class="points-box">💰 积分 <span id="pointsDisplay">0</span></div>
        <div class="streak-box">🔥 连战 <span id="streakDisplay">1</span>天</div>
    </div>

    <div class="world-map">
        <div class="chapter-title">🐉 第一章 · 征途再启 🌟</div>
        <div class="progress-area">
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">征途进度 <span id="progressCount">0</span> / <span id="totalTasks">0</span></div>
        </div>
        <div style="overflow-x: auto; padding-bottom: 10px;">
            <div class="node-row" id="taskNodes"></div>
        </div>
    </div>

    <div id="portalArea" style="text-align: center; margin: 15px 0;"></div>

    <div id="bonusArea" class="bonus-area" style="display: none;">
        <h3>✨ 传送门秘境 ✨</h3>
        <div id="bonusList"></div>
    </div>

    <div id="treasureArea" class="treasure-area" style="display: none;">
        <button class="treasure-btn" onclick="openTreasure()">🎁 开启全清宝箱 🎁</button>
    </div>

    <div id="lootDisplay" style="background:#1e1e2e; padding:12px; border-radius:40px; margin: 15px 0; text-align:center;">✨ 点击节点，开启讨伐 ✨</div>

    <div class="tab-bar">
        <button class="tab-btn" onclick="switchTab('quest')">⚔️ 讨伐</button>
        <button class="tab-btn" onclick="switchTab('shop')">🏪 赏金所</button>
        <button class="tab-btn" onclick="switchTab('points')">📜 史记</button>
    </div>
    <div class="admin-link"><a href="/admin/login" style="color:#aaa;">🛠️ 管理后台</a></div>
</div>

<script>
    let tasksData = [];
    let defeatedIds = [];
    let portalAvailable = false;
    let bonusQuests = [];
    let treasureAvailable = false;

    async function loadGameData() {
        // 获取积分/连胜
        let statusRes = await fetch('/status');
        let status = await statusRes.json();
        document.getElementById('pointsDisplay').innerText = status.points;
        document.getElementById('streakDisplay').innerText = status.streak;

        // 获取任务列表 + 完成状态
        let tasksRes = await fetch('/tasks_list');
        let tasksJson = await tasksRes.json();
        tasksData = tasksJson.tasks;
        defeatedIds = tasksJson.completed_ids || [];

        // 获取彩蛋任务（通过首页数据，这里简化处理）
        // 实际使用时应该从后端获取，暂时用全局变量
        renderMap();
        checkFullClear();
    }

    function renderMap() {
        const container = document.getElementById('taskNodes');
        container.innerHTML = '';
        const total = tasksData.length;
        document.getElementById('totalTasks').innerText = total;
        const completedCount = defeatedIds.length;
        document.getElementById('progressCount').innerText = completedCount;
        const percent = (completedCount / total) * 100;
        document.getElementById('progressFill').style.width = percent + '%';

        tasksData.forEach((task, idx) => {
            const isCompleted = defeatedIds.includes(task.id);
            const node = document.createElement('div');
            node.className = `node-card ${isCompleted ? 'completed' : ''}`;
            node.onclick = () => fightMonster(task.id);
            node.innerHTML = `
                <div class="node-icon">${task.icon}</div>
                <div class="node-name">${task.name}</div>
                <div class="node-status">${isCompleted ? '✅ 已完成' : '⚔️ 可讨伐'}</div>
            `;
            container.appendChild(node);
            if (idx !== tasksData.length - 1) {
                const lineSpan = document.createElement('span');
                lineSpan.className = 'connector-line';
                lineSpan.innerHTML = ' ➡️ ';
                container.appendChild(lineSpan);
            }
        });

        // 传送门条件：完成 80% 以上任务（与服务端一致）
        if (!portalAvailable && completedCount >= Math.ceil(total * 0.8)) {
            portalAvailable = true;
            showPortal();
        }
    }

    function showPortal() {
        const portalDiv = document.getElementById('portalArea');
        portalDiv.innerHTML = `<div class="node-card portal-card" style="display:inline-block; padding:12px 30px;" onclick="openPortal()">
                                    🌀 神秘传送门 🌀<br>✨ 点击进入异界 ✨
                                </div>`;
    }

    async function openPortal() {
        let resp = await fetch('/portal', {method: 'POST'});
        let data = await resp.json();
        if (data.status === 'ok') {
            alert('✨ 你进入了秘境，获得了彩蛋任务！✨');
            await loadBonusQuests();
            location.reload();
        } else {
            alert(data.error);
        }
    }

    async function loadBonusQuests() {
        // 彩蛋任务需要从后端获取，这里简单重新加载页面
        location.reload();
    }

    function showBonusQuests(quests) {
        if (!quests || quests.length === 0) return;
        const bonusArea = document.getElementById('bonusArea');
        const bonusList = document.getElementById('bonusList');
        bonusList.innerHTML = '';
        quests.forEach((quest, idx) => {
            if (!quest.completed) {
                const div = document.createElement('div');
                div.className = 'bonus-quest';
                div.innerHTML = `
                    <div>
                        <strong>${quest.name}</strong><br>
                        <small>${quest.desc}</small><br>
                        <span>+${quest.points_range[0]}-${quest.points_range[1]}积分</span>
                    </div>
                    <button class="complete-bonus-btn" onclick="completeBonus(${idx})">✨ 完成</button>
                `;
                bonusList.appendChild(div);
            }
        });
        bonusArea.style.display = 'block';
    }

    async function completeBonus(idx) {
        let resp = await fetch('/complete_bonus', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({bonus_index: idx})
        });
        let data = await resp.json();
        if (data.error) {
            alert(data.error);
        } else {
            alert(`完成 ${data.quest_name}！${data.loot_effect}`);
            location.reload();
        }
    }

    async function openTreasure() {
        let resp = await fetch('/treasure', {method: 'POST'});
        let data = await resp.json();
        if (data.error) {
            alert(data.error);
        } else {
            alert(data.loot_info);
            location.reload();
        }
    }

    function checkFullClear() {
        const total = tasksData.length;
        const completedCount = defeatedIds.length;
        if (completedCount === total && total > 0) {
            document.getElementById('treasureArea').style.display = 'block';
        } else {
            document.getElementById('treasureArea').style.display = 'none';
        }
    }

    async function fightMonster(taskId) {
        let resp = await fetch('/fight', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({task_id: taskId})
        });
        let data = await resp.json();
        if (data.error) {
            document.getElementById('lootDisplay').innerHTML = '⚠️ ' + data.error;
            return;
        }
        document.getElementById('lootDisplay').innerHTML = `⚔️ 击败 ${data.monster_name}！<br>🎁 获得 ${data.base_points} 积分 ✨ ${data.loot_effect || ''}`;
        loadGameData();
    }

    function switchTab(tab) {
        if (tab === 'shop') window.location.href = '/shop';
        if (tab === 'points') window.location.href = '/points';
        if (tab === 'quest') window.location.reload();
    }

    // 页面加载时从后端获取彩蛋任务数据
    async function loadInitialData() {
        await loadGameData();
        // 尝试获取彩蛋任务（通过主页数据，实际需要后端接口）
        // 简化处理：如果有bonus_quests数据，通过Jinja2模板注入
    }

    // 从模板注入的彩蛋任务数据（由后端渲染时传入）
    {% if bonus_quests %}
    window.bonusQuests = {{ bonus_quests | tojson }};
    setTimeout(() => showBonusQuests(window.bonusQuests), 100);
    {% endif %}

    // 从模板注入的传送门和宝箱状态
    {% if portal_used %}
    window.portalUsed = true;
    {% endif %}

    {% if all_defeated %}
    window.allDefeated = true;
    {% endif %}

    loadGameData();
</script>
</body>
</html>
