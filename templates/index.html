<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>蛋仔勇者之路 · 征途再启</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="game-container">
    <div class="stats-bar">
        <div class="points-box">💰 积分 <span id="pointsDisplay">0</span></div>
        <div class="streak-box">🔥 连战 <span id="streakDisplay">1</span>天</div>
    </div>

    <div class="world-map">
        <div class="chapter-title">🐉 第一章 · 征途再启 🌟</div>
        <div class="progress-area">
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">征途进度 <span id="progressCount">0</span> / <span id="totalTasks">0</span></div>
        </div>
        <div class="map-scroll-area" id="mapScrollArea">
            <div class="path-container" id="pathContainer">
                <div class="node-row" id="taskNodes"></div>
                <div class="player-wrapper" id="playerWrapper">
                    <div class="player-base"></div>
                    <div class="player-character" id="playerCharacter">🧒</div>
                    <div class="player-name">小勇者</div>
                </div>
            </div>
        </div>
    </div>

    <div id="portalArea" style="text-align: center; margin: 15px 0;"></div>
    <div id="bonusArea" class="bonus-area" style="display: none;"><h3>✨ 传送门秘境 ✨</h3><div id="bonusList"></div></div>
    <div id="treasureArea" class="treasure-area" style="display: none;"><button class="treasure-btn" onclick="openTreasure()">🎁 开启全清宝箱 🎁</button></div>
   <div id="lootDisplay" style="background:#1e1e2e; padding:12px; border-radius:40px; margin: 15px 0; text-align:center; color: white;">✨ 点击怪物，查看任务详情 ✨</div>

    <div class="tab-bar">
        <button class="tab-btn" onclick="switchTab('quest')">⚔️ 讨伐</button>
        <button class="tab-btn" onclick="switchTab('shop')">🏪 赏金所</button>
        <button class="tab-btn" onclick="switchTab('points')">📜 史记</button>
    </div>
    <div class="admin-link"><a href="/admin/login">🛠️ 管理后台</a></div>
</div>

<!-- 任务详情弹窗 -->
<div id="taskModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <div class="modal-icon" id="modalIcon">🐗</div>
            <div class="modal-title" id="modalTitle">小野猪 - 起床</div>
        </div>
        <div class="modal-body">
            <div class="modal-section"><div class="modal-section-title">📝 任务描述</div><div class="modal-description" id="modalDesc">加载中...</div></div>
            <div class="modal-section"><div class="modal-section-title">💰 积分奖励</div><div id="modalRewards"></div></div>
            <div id="jumpRopeSection" style="display: none;">
                <div class="modal-section">
                    <div class="modal-section-title">🏃‍♂️ 跳绳个数</div>
                    <input type="number" id="jumpCountInput" placeholder="请输入跳绳个数" style="width:100%; padding:12px; border-radius:30px; background:#0a1a1a; color:white;">
                    <div class="progress-text" id="jumpProgress"></div>
                    <div class="config-hint">💡 最低300个可获得5-7分，每多100个+2分，上限1000个</div>
                </div>
            </div>
            <div id="modalTimerSection" style="display: none;">
                <div class="modal-section">
                    <div class="modal-section-title">⏱️ 计时器</div>
                    <div class="timer-display" id="timerDisplay" style="font-size: 2rem; text-align: center; font-family: monospace; background: #0a1a1a; padding: 10px; border-radius: 30px;">00:00</div>
                    <div class="timer-buttons-inline" style="margin-top: 10px;">
                        <button id="modalPauseTimerBtn" class="timer-btn-inline" style="background:#ffaa33; color:#333;">⏸ 暂停</button>
                        <button id="modalEndTimerBtn" class="timer-btn-inline" style="background:#aa4444;">⏹ 结束计时</button>
                    </div>
                    <div class="config-hint" id="timerHint" style="margin-top: 8px;">⏰ 最少需要15分钟</div>
                </div>
            </div>
        </div>
        <div class="modal-buttons">
            <button id="modalActionBtn" class="modal-btn modal-btn-primary">⚔️ 开始讨伐</button>
            <button id="modalCloseBtn" class="modal-btn modal-btn-secondary">关闭</button>
        </div>
    </div>
</div>

<!-- 确认弹窗 -->
<div id="confirmOverlay" class="confirm-overlay">
    <div class="confirm-container">
        <div class="confirm-body">
            <div id="confirmMessage"></div>
        </div>
        <div class="confirm-buttons">
            <button id="confirmYesBtn" class="confirm-btn confirm-yes">✅ 确认</button>
            <button id="confirmNoBtn" class="confirm-btn">❌ 取消</button>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
